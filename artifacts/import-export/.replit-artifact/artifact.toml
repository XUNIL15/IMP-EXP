kind = "web"
previewPath = "/"
title = "Gestion Import/Export"
version = "1.0.0"
id = "artifacts/import-export"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21737

[services.development]
run = "pnpm --filter @workspace/import-export run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/import-export", "run", "build" ]
publicDir = "artifacts/import-export/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21737"
BASE_PATH = "/"
