openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Import/Export management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transitaires
    description: Freight forwarder management
  - name: clients
    description: Client management
  - name: arrivages
    description: Shipment management
  - name: colis
    description: Package management
  - name: paiements
    description: Payment management
  - name: rapports
    description: Reports and exports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /transitaires:
    get:
      operationId: listTransitaires
      tags: [transitaires]
      summary: List all freight forwarders
      responses:
        "200":
          description: List of freight forwarders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transitaire"
    post:
      operationId: createTransitaire
      tags: [transitaires]
      summary: Create a new freight forwarder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransitaireRequest"
      responses:
        "201":
          description: Freight forwarder created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transitaire"

  /transitaires/{id}:
    put:
      operationId: updateTransitaire
      tags: [transitaires]
      summary: Update a freight forwarder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransitaireRequest"
      responses:
        "200":
          description: Updated freight forwarder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transitaire"
    delete:
      operationId: deleteTransitaire
      tags: [transitaires]
      summary: Delete a freight forwarder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients/{id}/historique-paiements:
    get:
      operationId: getClientPaiements
      tags: [clients]
      summary: Get payment history for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaiementDetail"

  /arrivages:
    get:
      operationId: listArrivages
      tags: [arrivages]
      summary: List all shipments
      parameters:
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of shipments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Arrivage"
    post:
      operationId: createArrivage
      tags: [arrivages]
      summary: Create a new shipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArrivageRequest"
      responses:
        "201":
          description: Shipment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Arrivage"

  /arrivages/{id}:
    get:
      operationId: getArrivage
      tags: [arrivages]
      summary: Get shipment by ID with its packages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Shipment with packages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArrivageDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateArrivage
      tags: [arrivages]
      summary: Update a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArrivageRequest"
      responses:
        "200":
          description: Updated shipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Arrivage"
    delete:
      operationId: deleteArrivage
      tags: [arrivages]
      summary: Delete a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /colis:
    get:
      operationId: listColis
      tags: [colis]
      summary: List all packages
      parameters:
        - name: arrivageId
          in: query
          schema:
            type: integer
        - name: clientId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [individuel, mixte]
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ColisDetail"
    post:
      operationId: createColis
      tags: [colis]
      summary: Create a new package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateColisRequest"
      responses:
        "201":
          description: Package created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColisDetail"

  /colis/{id}:
    get:
      operationId: getColis
      tags: [colis]
      summary: Get package by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColisDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateColis
      tags: [colis]
      summary: Update a package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateColisRequest"
      responses:
        "200":
          description: Updated package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColisDetail"
    delete:
      operationId: deleteColis
      tags: [colis]
      summary: Delete a package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /colis-proprietaires/{id}/paiements:
    post:
      operationId: enregistrerPaiement
      tags: [paiements]
      summary: Record a payment for a package owner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaiementRequest"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Paiement"

  /dettes:
    get:
      operationId: listDettes
      tags: [paiements]
      summary: List all outstanding debts
      parameters:
        - name: clientId
          in: query
          schema:
            type: integer
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of debts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DetteDetail"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [rapports]
      summary: Get dashboard statistics
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  /bilan-journalier:
    get:
      operationId: getBilanJournalier
      tags: [rapports]
      summary: Get daily report
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BilanJournalier"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Transitaire:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        code:
          type: string
        contact:
          type: string
          nullable: true
        dateCreation:
          type: string
          format: date-time
      required:
        - id
        - nom
        - code
        - dateCreation

    CreateTransitaireRequest:
      type: object
      properties:
        nom:
          type: string
        code:
          type: string
        contact:
          type: string
          nullable: true
      required:
        - nom
        - code

    Client:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        telephone:
          type: string
        adresse:
          type: string
          nullable: true
        dateCreation:
          type: string
          format: date-time
        totalDu:
          type: number
        totalPaye:
          type: number
        solde:
          type: number
      required:
        - id
        - nom
        - telephone
        - dateCreation
        - totalDu
        - totalPaye
        - solde

    CreateClientRequest:
      type: object
      properties:
        nom:
          type: string
        telephone:
          type: string
        adresse:
          type: string
          nullable: true
      required:
        - nom
        - telephone

    Arrivage:
      type: object
      properties:
        id:
          type: integer
        codeArrivage:
          type: string
        transitaireId:
          type: integer
        transitaireNom:
          type: string
        transitaireCode:
          type: string
        dateArrivee:
          type: string
          format: date
        nbColisTotal:
          type: integer
        poidsTotal:
          type: number
        coutTotal:
          type: number
        dateCreation:
          type: string
          format: date-time
      required:
        - id
        - codeArrivage
        - transitaireId
        - transitaireNom
        - transitaireCode
        - dateArrivee
        - nbColisTotal
        - poidsTotal
        - coutTotal
        - dateCreation

    ArrivageDetail:
      allOf:
        - $ref: "#/components/schemas/Arrivage"
        - type: object
          properties:
            colis:
              type: array
              items:
                $ref: "#/components/schemas/ColisDetail"
          required:
            - colis

    CreateArrivageRequest:
      type: object
      properties:
        transitaireId:
          type: integer
        dateArrivee:
          type: string
          format: date
        nbColisTotal:
          type: integer
        poidsTotal:
          type: number
        coutTotal:
          type: number
      required:
        - transitaireId
        - dateArrivee
        - nbColisTotal
        - poidsTotal
        - coutTotal

    Colis:
      type: object
      properties:
        id:
          type: integer
        arrivageId:
          type: integer
        codeColisReel:
          type: string
        codeColisComplet:
          type: string
        type:
          type: string
          enum: [individuel, mixte]
        poids:
          type: number
        montant:
          type: number
        dateCreation:
          type: string
          format: date-time
      required:
        - id
        - arrivageId
        - codeColisReel
        - codeColisComplet
        - type
        - poids
        - montant
        - dateCreation

    ColisProprietaire:
      type: object
      properties:
        id:
          type: integer
        colisId:
          type: integer
        clientId:
          type: integer
        clientNom:
          type: string
        clientTelephone:
          type: string
        poids:
          type: number
        montantDu:
          type: number
        montantPaye:
          type: number
        solde:
          type: number
      required:
        - id
        - colisId
        - clientId
        - clientNom
        - clientTelephone
        - poids
        - montantDu
        - montantPaye
        - solde

    ColisDetail:
      allOf:
        - $ref: "#/components/schemas/Colis"
        - type: object
          properties:
            proprietaires:
              type: array
              items:
                $ref: "#/components/schemas/ColisProprietaire"
            arrivageDate:
              type: string
              format: date
            arrivageCode:
              type: string
          required:
            - proprietaires
            - arrivageDate
            - arrivageCode

    CreateColisProprietaireRequest:
      type: object
      properties:
        clientId:
          type: integer
        poids:
          type: number
        montantDu:
          type: number
        montantPaye:
          type: number
      required:
        - clientId
        - poids
        - montantDu
        - montantPaye

    CreateColisRequest:
      type: object
      properties:
        arrivageId:
          type: integer
        codeColisReel:
          type: string
        type:
          type: string
          enum: [individuel, mixte]
        poids:
          type: number
        montant:
          type: number
        proprietaires:
          type: array
          items:
            $ref: "#/components/schemas/CreateColisProprietaireRequest"
      required:
        - arrivageId
        - codeColisReel
        - type
        - poids
        - montant
        - proprietaires

    Paiement:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        colisProprietaireId:
          type: integer
        montant:
          type: number
        datePaiement:
          type: string
          format: date-time
        mode:
          type: string
      required:
        - id
        - clientId
        - colisProprietaireId
        - montant
        - datePaiement
        - mode

    CreatePaiementRequest:
      type: object
      properties:
        montant:
          type: number
        mode:
          type: string
          enum: [especes, virement, cheque, mobile]
      required:
        - montant
        - mode

    PaiementDetail:
      type: object
      properties:
        id:
          type: integer
        colisCode:
          type: string
        montant:
          type: number
        datePaiement:
          type: string
          format: date-time
        mode:
          type: string
        montantDu:
          type: number
        soldeApres:
          type: number
      required:
        - id
        - colisCode
        - montant
        - datePaiement
        - mode
        - montantDu
        - soldeApres

    DetteDetail:
      type: object
      properties:
        colisProprietaireId:
          type: integer
        clientId:
          type: integer
        clientNom:
          type: string
        clientTelephone:
          type: string
        colisCode:
          type: string
        arrivageDate:
          type: string
          format: date
        montantDu:
          type: number
        montantPaye:
          type: number
        solde:
          type: number
      required:
        - colisProprietaireId
        - clientId
        - clientNom
        - clientTelephone
        - colisCode
        - arrivageDate
        - montantDu
        - montantPaye
        - solde

    DashboardData:
      type: object
      properties:
        today:
          type: object
          properties:
            nbColis:
              type: integer
            poidsTotal:
              type: number
            montantTotal:
              type: number
            montantEncaisse:
              type: number
            dettesTotal:
              type: number
          required:
            - nbColis
            - poidsTotal
            - montantTotal
            - montantEncaisse
            - dettesTotal
        evolutionColis:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              nbColis:
                type: integer
              montant:
                type: number
            required:
              - date
              - nbColis
              - montant
        topClients:
          type: array
          items:
            type: object
            properties:
              clientId:
                type: integer
              clientNom:
                type: string
              totalDu:
                type: number
              solde:
                type: number
            required:
              - clientId
              - clientNom
              - totalDu
              - solde
        totalDettesGlobal:
          type: number
      required:
        - today
        - evolutionColis
        - topClients
        - totalDettesGlobal

    BilanJournalier:
      type: object
      properties:
        date:
          type: string
          format: date
        nbColisIndividuels:
          type: integer
        nbColisMixtes:
          type: integer
        poidsIndividuels:
          type: number
        poidsMixtes:
          type: number
        montantTotal:
          type: number
        montantEncaisse:
          type: number
        montantDu:
          type: number
        dettes:
          type: array
          items:
            $ref: "#/components/schemas/DetteDetail"
        colis:
          type: array
          items:
            $ref: "#/components/schemas/ColisDetail"
      required:
        - date
        - nbColisIndividuels
        - nbColisMixtes
        - poidsIndividuels
        - poidsMixtes
        - montantTotal
        - montantEncaisse
        - montantDu
        - dettes
        - colis
